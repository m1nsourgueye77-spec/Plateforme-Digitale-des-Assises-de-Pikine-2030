<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Questionnaire citoyen</title>

<body>

    <header>

<p id="statusMsg"></p>

<form id="questionnaireForm">

<input type="hidden" name="formType" value="questionnaire">

<p>Quelle est votre priorité ?</p>

<input type="radio"
name="priorite"

<br>

<input type="radio"
name="priorite"

<br>

<input type="radio"
name="priorite"
value="Education"> Education

<br>

<input type="radio"
name="priorite"
value="Numérique"> Numérique

<input type="radio"
name="priorite"

<br>

<input type="radio"
name="priorite"
value="Sécurité"> Sécurité

<br><br>

<label>Suggestions</label>

<textarea
name="suggestions"
rows="6">
</textarea>

<br><br>

<input type="submit"
value="Valider">

<button type="button" onclick="exportPDF('questionnaireForm')">
Exporter en PDF
</button>
</form>


<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
