<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Contribution citoyenne</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>


    <header>
        <img src="Logo Assises de Pikine 2030.jpeg" alt="Logo Assises de Pikine 2030" class="logo">

<h1>ASSISES DE PIKINE</h1>
<p>Contribution citoyenne</p>

</header>
<p id="statusMsg"></p>

<form id="contributionForm">

    <input type="hidden" name="formType" value="contribution">

<label>Nom</label>
<input type="text" name="nom">

<label>Prénom</label>
<input type="text" name="prenom">

<label>Commune</label>
<input type="text" name="commune">

<label>Quartier</label>
<input type="text" name="quartier">

<label>Profession *</label>
<input type="text" name="profession" required>

<label>Contact (Téléphone) *</label>
<input type="tel" name="telephone" required>

<label>Thème</label>

<select name="theme">

<option>Emploi</option>
<option>Éducation</option>
<option>Santé</option>
<option>Numérique</option>
<option>Cadre de vie</option>
<option>Autonomisation des femmes</option>
<option>Jeunesse</option>
<option>Environnement</option>
<option>Culture</option>
<option>Gouvernance</option>
<option>Autre (à préciser)</option>

</select>

<label>Si "Autre", précisez</label>
<input type="text" name="autre_theme">



<input type="submit"
value="Envoyer">

<button type="button" onclick="exportPDF('contributionForm')">
Exporter en PDF
</button>

</form>


<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="js/script.js"></script>
</body>
</html>
