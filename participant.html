<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription des Participants</title>

<link rel="stylesheet" href="css/style.css">

</head>
<body>

<header>
<img src="Logo Assises de Pikine 2030.jpeg" alt="Logo Assises de Pikine 2030" class="logo">


<h1>ASSISES DE PIKINE 2030</h1>

<p>Inscription des Participants</p>

</header>

<p id="statusMsg"></p>

<form id="participantForm">

    <input type="hidden"
name="formType"
value="participant">

<label>Nom *</label>
<input type="text" name="nom" required>

<label>Prénom *</label>
<input type="text" name="prenom" required>

<label>Sexe *</label>

<select name="sexe" required>
<option value="">Choisir...</option>
<option>Masculin</option>
<option>Féminin</option>
</select>


<label>Tranche d'âge *</label>

<select name="age" required>

<option value="">Choisir...</option>

<option value="moins_18">Moins de 18 ans</option>

<option value="18_35">18 à 35 ans</option>

<option value="plus_35">Plus de 35 ans</option>

</select>


<label>Téléphone *</label>
<input type="tel" name="telephone" required>

<label>Email</label>
<input type="email" name="email">

<label>Commune *</label>
<input type="text" name="commune" required>

<label>Quartier</label>
<input type="text" name="quartier">

<label>Profession</label>
<input type="text" name="profession">

<label>Organisation / Structure</label>
<input type="text" name="structure">

<label>Commission souhaitée</label>

<select name="commission">

<option>Emploi</option>
<option>Éducation</option>
<option>Santé</option>
<option>Numérique</option>
<option>Cadre de vie</option>
<option>Autonomisation des femmes</option>
<option>Jeunesse</option>
<option>Environnement</option>
<option>Culture</option>
<option>Gouvernance</option>
<option>Autre (à préciser)</option>

</select>

<label>Si "Autre", précisez</label>
<input type="text" name="autre_theme">


<input
type="submit"
value="S'inscrire">

<button type="button" onclick="exportPDF('participantForm')">
Exporter en PDF
</button>>

</form>


<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="js/script.js"></script>
</body>
</html>
