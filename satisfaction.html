<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Enquête de satisfaction</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<h2>Enquête de satisfaction</h2>

<form id="satisfactionForm">

    <input type="hidden"
name="formType"
value="satisfaction">

<label>Nom</label>

<input type="text"
name="nom">

<label>Organisation</label>

<select
name="organisation">

<option>Excellent</option>

<option>Très bien</option>

<option>Bien</option>

<option>Moyen</option>

<option>Insuffisant</option>

</select>

<label>Accueil</label>

<select
name="accueil">

<option>Excellent</option>

<option>Très bien</option>

<option>Bien</option>

<option>Moyen</option>

<option>Insuffisant</option>

</select>

<label>Commentaires</label>

<textarea
name="commentaires"
rows="6">
</textarea>

<br><br>

<input
type="submit"
value="Envoyer">

</form>


<script src="script.js"></script>
</body>
</html>
