<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Enquête de satisfaction</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <img src="Logo Assises de Pikine 2030.jpeg" alt="Logo Assises de Pikine 2030" class="logo">

        <h1>ASSISES DE PIKINE</h1>
<p>Enquête de satisfaction</p>
</header>

<form id="satisfactionForm">

    <input type="hidden" name="formType" value="satisfaction">

<label>Nom</label>

<input type="text"
name="nom">

<label>Organisation</label>

<select
name="organisation">

<option>Excellent</option>

<option>Très bien</option>

<option>Bien</option>

<option>Moyen</option>

<option>Insuffisant</option>

</select>

<label>Accueil</label>

<select
name="accueil">

<option>Excellent</option>

<option>Très bien</option>

<option>Bien</option>

<option>Moyen</option>

<option>Insuffisant</option>

</select>

<label>Commentaires</label>

<textarea
name="commentaires"
rows="6">
</textarea>

<br><br>

<input
type="submit"
value="Envoyer">

<button type="button" onclick="exportPDF('satisfactionForm')">
Exporter en PDF
</button>


</form>


<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="js/script.js"></script>
</body>
</html>
